<body class="bg-background font-body-md text-body-md text-on-surface antialiased">
<!-- Dimmed Background Overlay -->
<div class="fixed inset-0 bg-ink/40 z-40 backdrop-blur-sm flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-lg rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[795px]">
<!-- Modal Header -->
<div class="px-xl pt-xl pb-md border-b-2 border-surface-dim">
<h2 class="font-display-sm text-display-sm text-ink font-bold">Edit metadata</h2>
</div>
<!-- Modal Content (Scrollable) -->
<div class="px-xl py-lg flex-1 overflow-y-auto space-y-xl">
<!-- Merchant Group Input -->
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-caption font-caption text-mute">Merchant group</label>
<div class="flex items-center border-[1.5px] border-ink rounded-md px-md py-md bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary-container transition-shadow">
<span class="material-symbols-outlined text-ink mr-md" data-icon="storefront">storefront</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-md text-ink outline-none" type="text" value="Amazon / Flipkart">
</div>
</div>
<!-- Category Dropdown -->
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-caption font-caption text-mute">Category</label>
<div class="flex items-center justify-between border-[1.5px] border-ink rounded-md px-md py-md bg-surface-container-lowest cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center">
<span class="material-symbols-outlined text-ink mr-md" data-icon="category">category</span>
<span class="font-body-md text-ink">Online Shopping /</span>
</div>
<span class="material-symbols-outlined text-ink" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<!-- Create Category Action -->
<button class="flex items-center text-primary font-button-md text-button-md hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mr-sm" data-icon="add">add</span>
                    Create category
                </button>
<!-- Subcategory Dropdown -->
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-caption font-caption text-mute">Subcategory</label>
<div class="flex items-center justify-between border-[1.5px] border-ink rounded-md px-md py-md bg-surface-container-lowest cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center">
<span class="material-symbols-outlined text-ink mr-md" data-icon="sell">sell</span>
<span class="font-body-md text-ink">Marketplace purchase/</span>
</div>
<span class="material-symbols-outlined text-ink" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<!-- Confidence Dropdown -->
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-caption font-caption text-mute">Confidence</label>
<div class="flex items-center justify-between border-[1.5px] border-ink rounded-md px-md py-md bg-surface-container-lowest cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center">
<span class="material-symbols-outlined text-ink mr-md" data-icon="verified">verified</span>
<span class="font-body-md text-ink">Medium</span>
</div>
<span class="material-symbols-outlined text-ink" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<!-- Notes Input -->
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-caption font-caption text-mute">Notes</label>
<div class="flex items-start border-[1.5px] border-ink rounded-md px-md py-md bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary-container transition-shadow">
<span class="material-symbols-outlined text-ink mr-md mt-1" data-icon="notes">notes</span>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-md text-ink outline-none resize-none" placeholder="Add notes..." rows="2"></textarea>
</div>
</div>
<!-- Contextual Text -->
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Applies to matching statement merchant and future imports.
                </p>
</div>
<!-- Modal Actions -->
<div class="px-xl py-lg bg-surface-container-lowest border-t-2 border-surface-dim flex justify-between items-center gap-md">
<button class="flex items-center justify-center font-button-md text-button-md text-ink bg-transparent border-[1.5px] border-ink rounded-full px-lg py-sm hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="auto_awesome">auto_awesome</span>
                    Suggest
                </button>
<div class="flex gap-md">
<button class="font-button-md text-button-md text-ink bg-canvas-soft rounded-full px-lg py-sm hover:opacity-80 transition-opacity">
                        Cancel
                    </button>
<button class="flex items-center justify-center font-button-md text-button-md text-on-primary-fixed bg-primary-container rounded-full px-lg py-sm hover:bg-primary-active transition-colors">
<span class="material-symbols-outlined mr-sm" data-icon="check">check</span>
                        Save
                    </button>
</div>
</div>
</div>
</div>
</body></html>
